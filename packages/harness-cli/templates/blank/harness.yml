# harness.yml — the deployment manifest. Your program lives in harness/harness.ts.
# Every surface listed explicitly; only the fields you chose are shown.
#
#   cli      a terminal app      (npm start)
#   desktop  a Mac/Windows app   (npm run dev:desktop)
#   web      a browser app       (npm run serve, then npm run dev:web)
#
# One harness, three surfaces — same events over a different binding, all folding
# the one reduce in harness/state.ts.
targets: [cli, desktop, web]

model:
  llm:
    id: "reasoning-4b"          # kvCache: q4_0 · gpu: auto · branches: from capacity — add a line to override
    context: 32768
  # An app that needs a reranker (e.g. corpus, web) auto-provisions the catalog
  # default when it's enabled. Pin a specific one here to override:
  #   reranker:
  #     id: "qwen3-reranker-0.6b-q8"
